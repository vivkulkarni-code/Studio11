kind = "web"
previewPath = "/"
title = "Studio11 Luxury Lookbook"
version = "1.0.0"
id = "artifacts/studio11"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20357

[services.development]
run = "pnpm --filter @workspace/studio11 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/studio11", "run", "build" ]
publicDir = "artifacts/studio11/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20357"
BASE_PATH = "/"
